name: Build components

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  lint:
    name: Rust Lint & Format
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          components: rustfmt, clippy
          targets: aarch64-unknown-none, aarch64-unknown-uefi

      - name: Run pre-commit checks
        run: .husky/pre-commit

  devcontainer:
    name: Build Multiplatform Devcontainer
    runs-on: ubuntu-24.04
    env:
      # Docker-safe branch tag: foo/bar -> foo-bar
      BRANCH_TAG: ${{ github.head_ref && format('{0}', github.head_ref) || github.ref_name }}
    steps:
      - name: Sanitize branch tag
        id: branch
        run: echo "tag=$(echo '${{ env.BRANCH_TAG }}' | tr '/' '-' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Checkout patina-qemu submodule
        run: |
          git submodule update --init bios/patina-qemu

      - name: Set up QEMU for multi-architecture builds
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker buildx for multi-architecture builds
        uses: docker/setup-buildx-action@v3
        with:
          use: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build devcontainer image
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/opendevicepartnership/odp-platform-qemu-sbsa-devcontainer
          cacheFrom: |
            ghcr.io/dymk/odp-platform-qemu-sbsa-devcontainer:${{ steps.branch.outputs.tag }}
            ghcr.io/dymk/odp-platform-qemu-sbsa-devcontainer:main
            ghcr.io/dymk/odp-platform-qemu-sbsa-devcontainer:latest
            ghcr.io/opendevicepartnership/odp-platform-qemu-sbsa-devcontainer:${{ steps.branch.outputs.tag }}
            ghcr.io/opendevicepartnership/odp-platform-qemu-sbsa-devcontainer:main
            ghcr.io/opendevicepartnership/odp-platform-qemu-sbsa-devcontainer:latest
          platform: linux/amd64,linux/arm64
          # For now, never push, until ODP org is set up so CI can push to the
          # correct registry. Once that's done, we can change this to `always`
          # and remove the `cacheFrom` entries for the dymk images.
          push: never

  build-test-bios:
    name: Build & Test QEMU Bios
    runs-on: ubuntu-24.04-arm
    env:
      BRANCH_TAG: ${{ github.head_ref && format('{0}', github.head_ref) || github.ref_name }}
    steps:
      - name: Sanitize branch tag
        id: branch
        run: echo "tag=$(echo '${{ env.BRANCH_TAG }}' | tr '/' '-' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Cache git folder
        uses: actions/cache@v4
        with:
          path: .git
          key: git-folder-build-bios-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            git-folder-build-bios-${{ github.ref }}-
            git-folder-build-bios-

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: .sccache
          key: sccache-${{ runner.arch }}-${{ github.ref }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.arch }}-${{ github.ref }}-
            sccache-${{ runner.arch }}-

      - name: Build devcontainer image
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/opendevicepartnership/odp-platform-qemu-sbsa-devcontainer
          cacheFrom: |
            ghcr.io/dymk/odp-platform-qemu-sbsa-devcontainer:${{ steps.branch.outputs.tag }}
            ghcr.io/dymk/odp-platform-qemu-sbsa-devcontainer:main
            ghcr.io/dymk/odp-platform-qemu-sbsa-devcontainer:latest
            ghcr.io/opendevicepartnership/odp-platform-qemu-sbsa-devcontainer:${{ steps.branch.outputs.tag }}
            ghcr.io/opendevicepartnership/odp-platform-qemu-sbsa-devcontainer:main
            ghcr.io/opendevicepartnership/odp-platform-qemu-sbsa-devcontainer:latest
          push: never
          env: |
            CI=true
            GIT_COMMITTER_NAME=vscode
            GIT_COMMITTER_EMAIL=vscode@example.com
          runCmd: |
            make all
            make e2e-test QEMU_TIMEOUT=900
            sccache --show-stats
